<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>召喚寵物戰鬥訓練師</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <section class="top-bar" aria-label="遊戲狀態">
      <div><span>Lv</span><strong id="playerScore">1</strong></div>
      <div><span>G</span><strong id="roundNumber">0</strong></div>
      <div><span>AP</span><strong id="opponentScore">60/60</strong></div>
      <button class="icon-btn" id="saveButton" type="button" title="存檔">存</button>
    </section>

    <section class="map-screen" id="mapScreen">
      <div class="map-head">
        <div>
          <h1>寵物訓練師</h1>
          <p id="mapText">10 格內移動，每步消耗 1 AP。AP 每 3 分鐘回 1。</p>
        </div>
        <div class="move-panel">
          <div class="ap-meter" id="diceValue">60</div>
          <button class="primary-btn" id="diceButton" type="button">移動</button>
        </div>
      </div>

      <div class="map-main">
        <div class="map-board" id="mapBoard" aria-label="10x10 遊戲地圖"></div>
      </div>

      <nav class="bottom-tabs" aria-label="功能分頁">
        <button class="tab-btn is-active" data-tab="adventure" type="button">圖</button>
        <button class="tab-btn" data-tab="profile" type="button">人</button>
        <button class="tab-btn" data-tab="pets" type="button">寵</button>
        <button class="tab-btn" data-tab="items" type="button">具</button>
        <button class="tab-btn" data-tab="shop" type="button">店</button>
      </nav>

      <section class="tab-dock">
        <div class="tab-panel is-active" id="adventureTab">
          <div class="panel-title"><h2>冒險</h2><span>地圖</span></div>
          <div class="quick-stats" id="eventText">探索中</div>
        </div>
        <div class="tab-panel" id="profileTab">
          <div class="panel-title"><h2>人物</h2><span>資料</span></div>
          <div class="profile-grid" id="profileStats"></div>
        </div>
        <div class="tab-panel" id="petsTab">
          <div class="panel-title"><h2>寵物</h2><span id="teamSummary">5 上場</span></div>
          <div class="pet-actions">
            <button class="secondary-btn" id="healButton" type="button">♥</button>
            <button class="secondary-btn" id="trainButton" type="button">訓</button>
            <button class="secondary-btn" id="reviveButton" type="button">復</button>
          </div>
          <div class="pet-roster" id="deckChoices"></div>
        </div>
        <div class="tab-panel" id="itemsTab">
          <div class="panel-title"><h2>道具</h2><span>背包</span></div>
          <div class="bag-actions" id="bagActions"></div>
        </div>
        <div class="tab-panel" id="shopTab">
          <div class="panel-title"><h2>商店</h2><span>補給</span></div>
          <div class="shop-actions">
            <button class="secondary-btn" id="buyPotionButton" type="button">藥 15G</button>
            <button class="secondary-btn" id="buyWardButton" type="button">符 20G</button>
            <button class="secondary-btn" id="buySnareButton" type="button">網 25G</button>
            <button class="secondary-btn" id="buyWhistleButton" type="button">哨 40G</button>
          </div>
        </div>
      </section>
    </section>

    <section class="battle-screen is-hidden" id="battleScreen">
      <header class="battle-head">
        <div>
          <h1>讀秒戰鬥</h1>
          <p id="statusText">最多 5 隻寵物上場，行動條滿後選技能。</p>
        </div>
        <button class="secondary-btn is-hidden" id="continueButton" type="button">返回</button>
      </header>

      <section class="teams-row">
        <div>
          <h2>我方</h2>
          <div class="combat-team" id="battleChoices"></div>
        </div>
        <div>
          <h2>敵方</h2>
          <div class="combat-team" id="opponentHand"></div>
        </div>
      </section>

      <section class="battlefield" aria-label="對戰區">
        <article class="played-card" id="playerPlayed">
          <span class="card-mark">我</span>
          <small>待機</small>
        </article>
        <div class="versus">VS</div>
        <article class="played-card" id="opponentPlayed">
          <span class="card-mark">敵</span>
          <small>待機</small>
        </article>
      </section>

      <section class="command-panel">
        <div class="active-line" id="deckSlots">等待行動條。</div>
        <div class="skill-bar" id="playerHand"></div>
        <button class="primary-btn" id="startButton" type="button">開始</button>
      </section>
    </section>

    <section class="log-panel" aria-live="polite">
      <div id="resultText">讀取中。</div>
      <button class="secondary-btn" id="resetButton" type="button">新局</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
